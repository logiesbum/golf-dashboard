/* ── Helpers ─────────────────────────────────────────────────────────────── */
function TierBadge({tier}) {
  const tc = TIER_CONFIG[tier] || TIER_CONFIG["Value"];
  return (
    <span style={{background:tc.bg,border:`1px solid ${tc.border}`,color:tc.text,
      padding:"2px 9px",borderRadius:20,fontSize:10,fontWeight:600,whiteSpace:"nowrap"}}>
      {tier}
    </span>
  );
}

function UsedBadge() {
  return <span style={{marginLeft:6,fontSize:10,background:C.danger,color:"#fff",
    padding:"1px 6px",borderRadius:4,fontWeight:600}}>USED</span>;
}

function StatCell({v, bright=1}) {
  const color = v>0.8?"#86efac":v>0.3?"#fde68a":v>0?"#e8f0eb":"#f87171";
  return (
    <td style={{padding:"10px 10px",textAlign:"center",fontSize:12,
      fontFamily:"'DM Mono',monospace",color,fontWeight:v>1?"700":"400"}}>
      {typeof v === "number" ? v.toFixed(2) : v}
    </td>
  );
}

function SortTh({label, k, sortKey, sortDir, onSort, style={}}) {
  const active = sortKey===k;
  return (
    <th onClick={()=>onSort(k)} style={{padding:"11px 10px",fontSize:11,color:active?C.goldLight:C.muted,
      letterSpacing:"0.05em",textTransform:"uppercase",cursor:"pointer",userSelect:"none",
      fontFamily:"'DM Mono',monospace",whiteSpace:"nowrap",...style}}>
      {label} <span style={{opacity:active?1:0.25}}>{active&&sortDir==="asc"?"↑":"↓"}</span>
    </th>
  );
}

function Field({label, value, onChange, type="text", style={}}) {
  return (
    <div style={style}>
      <div style={{fontSize:11,color:C.muted,marginBottom:5,textTransform:"uppercase",
        letterSpacing:"0.06em",fontFamily:"'DM Mono',monospace"}}>{label}</div>
      <input type={type} value={value||""} onChange={e=>onChange(e.target.value)}
        style={{width:"100%",padding:"10px 12px",background:"#0a1410",border:`1px solid ${C.border}`,
          borderRadius:8,color:C.text,fontSize:13}}/>
    </div>
  );
}

/* ── Main App ─────────────────────────────────────────────────────────────── */
function App() {
  const [view, setView] = useState("overview");
  const [picks, setPicks] = useState([]);
  const [ranker, setRanker] = useState(DEFAULT_RANKER);
  const [refreshNote, setRefreshNote] = useState("");
  const [isRefreshing, setIsRefreshing] = useState(false);
  const [lastRefresh, setLastRefresh] = useState(null);
  const [selectedPlayer, setSelectedPlayer] = useState(null);
  const [pickModal, setPickModal] = useState(false);
  const [editIdx, setEditIdx] = useState(null);
  const [pickForm, setPickForm] = useState({});
  const [sortKey, setSortKey] = useState("sg");
  const [sortDir, setSortDir] = useState("desc");
  const [tourFilter, setTourFilter] = useState("all");
  const [searchQ, setSearchQ] = useState("");
  const [settingsOpen, setSettingsOpen] = useState(false);
  const [apiKey, setApiKey] = useState("");
  const [apiKeyInput, setApiKeyInput] = useState("");
  const [animKey, setAnimKey] = useState(0);

  useEffect(() => {
    const saved = store.get("picks"); if(saved) setPicks(saved);
    const sr = store.get("ranker"); if(sr) setRanker(sr);
    const sn = store.get("note"); if(sn) setRefreshNote(sn);
    const sl = store.get("lastRefresh"); if(sl) setLastRefresh(sl);
    const sk = store.get("apiKey"); if(sk) setApiKey(sk);
  }, []);

  useEffect(() => { store.set("picks", picks); }, [picks]);

  const usedNames = picks.map(p => p.player);

  const saveApiKey = () => {
    setApiKey(apiKeyInput);
    store.set("apiKey", apiKeyInput);
    setSettingsOpen(false);
  };

  const doRefresh = useCallback(async () => {
    if(!apiKey) { setSettingsOpen(true); return; }
    setIsRefreshing(true);
    try {
      const used = usedNames.length ? usedNames.join(", ") : "none";
      const resp = await fetch("https://api.anthropic.com/v1/messages", {
        method:"POST",
        headers:{"Content-Type":"application/json","x-api-key":apiKey,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
        body: JSON.stringify({
          model:"claude-sonnet-4-20250514", max_tokens:1200,
          messages:[{role:"user",content:
            `You are a PGA Tour analytics AI. Generate updated top-15 rankings for The Players Championship at TPC Sawgrass for a one-and-done pick'em bracket.\n\nUsed picks (cannot be selected): ${used}\nKey Sawgrass factors: SG:Approach is #1 stat, GIR% matters, accuracy > distance, island 17th tests short game.\n\nReturn ONLY valid JSON, no markdown:\n{"note":"1 sentence current storyline","players":[{"rank":1,"name":"Full Name","tier":"Elite","top10Prob":42,"winOdds":"+480","note":"under 10 words"}]}\n\nTiers: Elite, Contender, Hot Form, Sleeper, Value, LIV Watch, Specialist. Exactly 15 players. top10Prob is integer. If used, prefix note with ⚠️ USED.`
          }]
        })
      });
      const d = await resp.json();
      const txt = (d.content||[]).map(b=>b.text||"").join("");
      const m = txt.match(/\{[\s\S]*\}/);
      if(m) {
        const p = JSON.parse(m[0]);
        if(p.players?.length) {
          setRanker(p.players); store.set("ranker",p.players);
          setRefreshNote(p.note||""); store.set("note",p.note||"");
          const now = new Date().toLocaleTimeString("en-US",{hour:"2-digit",minute:"2-digit"})+" · "+new Date().toLocaleDateString("en-US",{month:"short",day:"numeric"});
          setLastRefresh(now); store.set("lastRefresh",now);
          setAnimKey(k=>k+1);
        }
      }
    } catch(e) { setRefreshNote("Error — check API key in Settings."); }
    setIsRefreshing(false);
  }, [apiKey, usedNames]);

  const openAdd = (week) => {
    setEditIdx(null);
    const s = SCHEDULE.find(x=>x.week===week);
    setPickForm({week:week||"",tournament:s?.name||"",player:"",odds:"",finish:"",top10:"",notes:""});
    setPickModal(true);
  };
  const openEdit = (pick,idx) => { setEditIdx(idx); setPickForm({...pick}); setPickModal(true); };
  const savePick = () => {
    if(!pickForm.player||!pickForm.week) return;
    if(editIdx!==null) setPicks(p=>p.map((x,i)=>i===editIdx?pickForm:x));
    else setPicks(p=>[...p,pickForm]);
    setPickModal(false);
  };
  const delPick = (idx) => { setPicks(p=>p.filter((_,i)=>i!==idx)); setPickModal(false); };

  const done = picks.filter(p=>p.finish);
  const top10s = done.filter(p=>p.top10==="Y").length;
  const hitRate = done.length ? Math.round(top10s/done.length*100) : 0;
  const totalPts = done.reduce((s,p)=>{const f=parseInt(p.finish); return s+(f===1?25:p.top10==="Y"?10:0);},0);
  const wins = picks.filter(p=>p.finish==="1"||p.finish?.toLowerCase().includes("w")).length;

  const filteredPlayers = PLAYERS
    .filter(p=>tourFilter==="all"||p.tour===tourFilter)
    .filter(p=>!searchQ||p.name.toLowerCase().includes(searchQ.toLowerCase()))
    .sort((a,b)=>{ const av=a[sortKey]??0,bv=b[sortKey]??0; if(typeof av==="string") return sortDir==="asc"?av.localeCompare(bv):bv.localeCompare(av); return sortDir==="asc"?av-bv:bv-av; });

  const handleSort = k => { if(sortKey===k) setSortDir(d=>d==="asc"?"desc":"asc"); else{setSortKey(k);setSortDir("desc");} };

  const radarData = selectedPlayer ? [
    {stat:"SG Total", val:Math.max(0,(selectedPlayer.sg+0.5)/3*100)},
    {stat:"Approach", val:Math.max(0,(selectedPlayer.sgApp+0.3)/1.4*100)},
    {stat:"Off Tee",  val:Math.max(0,(selectedPlayer.sgOtt+0.2)/1*100)},
    {stat:"ArndGrn",  val:Math.max(0,(selectedPlayer.sgAtg+0.1)/0.8*100)},
    {stat:"Putting",  val:Math.max(0,(selectedPlayer.sgPutt+0.3)/0.8*100)},
    {stat:"Fit",      val:selectedPlayer.fit/10*100},
  ] : [];

  const navItems = [
    {id:"overview",label:"Overview",  icon:"⊞"},
    {id:"ranker",  label:"Ranker",    icon:"🏆"},
    {id:"players", label:"Players",   icon:"👥"},
    {id:"picks",   label:"My Picks",  icon:"⭐"},
    {id:"schedule",label:"Schedule",  icon:"📅"},

  return (
    <div style={{display:"flex",height:"100vh",background:C.bg,fontFamily:"'DM Sans',sans-serif",color:C.text,overflow:"hidden"}}>

      {/* ── SIDEBAR ── */}
      <aside style={{width:216,background:C.panel,borderRight:`1px solid ${C.border}`,display:"flex",flexDirection:"column",flexShrink:0}}>

          <div style={{fontFamily:"'Playfair Display',serif",fontSize:22,fontWeight:900,color:C.gold}}>⛳ CADDIE</div>
          <div style={{fontSize:11,color:C.muted,marginTop:3,letterSpacing:"0.1em",textTransform:"uppercase"}}>Golf Analytics</div>
        </div>

        <nav style={{padding:"10px 8px",flex:1}}>
          {navItems.map(n=>(

              color:view===n.id?C.gold:C.muted,
              fontSize:13,fontWeight:view===n.id?600:400,transition:"all 0.12s",

              <span style={{fontSize:14}}>{n.icon}</span>{n.label}
            </button>

        </nav>

        <div style={{padding:"14px 16px",borderTop:`1px solid ${C.border}`}}>
          <div style={{fontSize:11,color:C.muted,letterSpacing:"0.07em",textTransform:"uppercase",marginBottom:10}}>Season 2026</div>
          {[["Picks",picks.length],["Top 10s",top10s],["Hit Rate",hitRate+"%"],["Points",totalPts]].map(([l,v])=>(
            <div key={l} style={{display:"flex",justifyContent:"space-between",marginBottom:7}}>
              <span style={{fontSize:12,color:C.muted}}>{l}</span>
              <span style={{fontSize:13,fontWeight:600,color:C.gold,fontFamily:"'DM Mono',monospace"}}>{v}</span>
            </div>
          ))}
        </div>

        <div style={{padding:"12px 14px",borderTop:`1px solid ${C.border}`,display:"flex",flexDirection:"column",gap:8}}>

            border:`1px solid ${C.green}`,borderRadius:8,color:"#fff",cursor:isRefreshing?"not-allowed":"pointer",

            <span style={{display:"inline-block",animation:isRefreshing?"spin 1s linear infinite":"none"}}>🔄</span>

          <button onClick={()=>setSettingsOpen(true)} style={{

          {lastRefresh&&<div style={{fontSize:10,color:C.muted,textAlign:"center"}}>{lastRefresh}</div>}
        </div>
      </aside>

      {/* ── MAIN ── */}
      <main style={{flex:1,overflow:"auto",display:"flex",flexDirection:"column"}}>
        {/* Topbar */}
        <div style={{padding:"14px 26px",borderBottom:`1px solid ${C.border}`,display:"flex",
          justifyContent:"space-between",alignItems:"center",background:C.panel,flexShrink:0}}>
          <div>
            <h1 style={{fontFamily:"'Playfair Display',serif",fontSize:20,fontWeight:700,color:C.text}}>
              {navItems.find(n=>n.id===view)?.label}
            </h1>
            {refreshNote&&<div style={{fontSize:12,color:C.goldLight,marginTop:3}}>⚡ {refreshNote}</div>}
          </div>
          {view==="players"&&(
            <div style={{display:"flex",gap:8}}>
              {["All","PGA","LIV"].map(t=>(
                <button key={t} onClick={()=>setTourFilter(t==="All"?"all":t)} style={{
                  padding:"6px 13px",borderRadius:6,border:`1px solid ${tourFilter===(t==="All"?"all":t)?C.gold:C.border}`,
                  background:tourFilter===(t==="All"?"all":t)?"rgba(212,175,55,0.12)":"transparent",
                  color:tourFilter===(t==="All"?"all":t)?C.gold:C.muted,cursor:"pointer",fontSize:12,

                          <div style={{fontSize:13,fontWeight:600}}>{p.name}{isUsed&&<UsedBadge/>}</div>

                        <TierBadge tier={p.tier}/>

                          <div style={{fontSize:10,color:C.muted}}>{s.dates}</div>

                            border:`1px solid ${C.green}`,borderRadius:5,color:C.lightGreen,cursor:"pointer"}}>+ Pick</button>

                      </div>

                  })}
                </div>
              </div>
            </div>

                          letterSpacing:"0.06em",textTransform:"uppercase",fontFamily:"'DM Mono',monospace"}}>{h}</th>
                      ))}
                    </tr>
                  </thead>
                  <tbody key={animKey}>
                    {ranker.map((p,i)=>{
                      const maxP=Math.max(...ranker.map(x=>x.top10Prob||0));
                      const isUsed=usedNames.includes(p.name);
                      const pl=PLAYERS.find(x=>x.name===p.name);
                      const pct=((p.top10Prob||0)/maxP*100).toFixed(0);
                      return (
                        <tr key={i} className="hover-row fade-up" style={{borderBottom:`1px solid ${C.border}`,
                          animationDelay:`${i*0.04}s`,opacity:isUsed?0.45:1}}>
                          <td style={{padding:"14px 14px",textAlign:"center",fontSize:18,fontWeight:700,
                            fontFamily:"'DM Mono',monospace",color:i===0?"#d4af37":i===1?"#94a3b8":i===2?"#cd7f32":C.muted}}>{p.rank}</td>
                          <td style={{padding:"14px 14px"}}>
                            <div style={{fontWeight:600,fontSize:13}}>
                              {pl?.country||""} {p.name}{isUsed&&<UsedBadge/>}
                            </div>
                            <div style={{fontSize:11,color:C.muted,marginTop:1}}>OWGR #{pl?.owgr||"—"}</div>
                          </td>
                          <td style={{padding:"14px 14px",textAlign:"center"}}><TierBadge tier={p.tier}/></td>
                          <td style={{padding:"14px 14px",minWidth:200}}>
                            <div style={{display:"flex",alignItems:"center",gap:10}}>
                              <div style={{flex:1,height:7,background:"rgba(255,255,255,0.05)",borderRadius:4,overflow:"hidden"}}>
                                <div style={{height:"100%",width:`${pct}%`,background:`linear-gradient(90deg,${C.green},${C.gold})`,borderRadius:4}}/>
                              </div>
                              <span style={{fontFamily:"'DM Mono',monospace",fontSize:14,fontWeight:700,minWidth:34,textAlign:"right",
                                color:(p.top10Prob||0)>=30?C.goldLight:(p.top10Prob||0)>=20?"#86efac":C.muted}}>{p.top10Prob}%</span>
                            </div>
                          </td>
                          <td style={{padding:"14px 14px",textAlign:"center",fontFamily:"'DM Mono',monospace",fontSize:13,color:C.muted}}>{p.winOdds}</td>
                          <td style={{padding:"14px 14px",fontSize:12,color:C.muted,maxWidth:240}}>{p.note}</td>
                        </tr>
                      );
                    })}
                  </tbody>
                </table>
              </div>
            </div>
          )}

          {/* ─── PLAYERS ─── */}
          {view==="players"&&(
            <div style={{display:"grid",gridTemplateColumns:selectedPlayer?"1fr 300px":"1fr",gap:16}}>
              <div>
                <input value={searchQ} onChange={e=>setSearchQ(e.target.value)} placeholder="🔍  Search players…"
                  style={{width:"100%",padding:"10px 14px",background:C.panel,border:`1px solid ${C.border}`,
                    borderRadius:8,color:C.text,fontSize:14,marginBottom:14}}/>
                <div style={{background:C.panel,border:`1px solid ${C.border}`,borderRadius:12,overflow:"auto"}}>
                  <table style={{width:"100%",borderCollapse:"collapse"}}>
                    <thead>
                      <tr style={{background:"#0a1a10"}}>
                        <SortTh label="#"       k="owgr"      sortKey={sortKey} sortDir={sortDir} onSort={handleSort} style={{textAlign:"center",width:44}}/>
                        <SortTh label="Player"  k="name"      sortKey={sortKey} sortDir={sortDir} onSort={handleSort} style={{textAlign:"left"}}/>
                        <SortTh label="SG Tot"  k="sg"        sortKey={sortKey} sortDir={sortDir} onSort={handleSort}/>
                        <SortTh label="SG App"  k="sgApp"     sortKey={sortKey} sortDir={sortDir} onSort={handleSort}/>
                        <SortTh label="SG OTT"  k="sgOtt"     sortKey={sortKey} sortDir={sortDir} onSort={handleSort}/>
                        <SortTh label="SG ATG"  k="sgAtg"     sortKey={sortKey} sortDir={sortDir} onSort={handleSort}/>
                        <SortTh label="Putt"    k="sgPutt"    sortKey={sortKey} sortDir={sortDir} onSort={handleSort}/>
                        <SortTh label="Drive"   k="drive"     sortKey={sortKey} sortDir={sortDir} onSort={handleSort}/>
                        <SortTh label="GIR%"    k="gir"       sortKey={sortKey} sortDir={sortDir} onSort={handleSort}/>
                        <SortTh label="Avg"     k="avg"       sortKey={sortKey} sortDir={sortDir} onSort={handleSort}/>
                        <SortTh label="Fit"     k="fit"       sortKey={sortKey} sortDir={sortDir} onSort={handleSort}/>
                        <SortTh label="T10%"    k="top10Prob" sortKey={sortKey} sortDir={sortDir} onSort={handleSort}/>
                        <th style={{padding:"11px 10px",fontSize:11,color:C.muted,width:60}}></th>
                      </tr>
                    </thead>
                    <tbody>
                      {filteredPlayers.map((p,i)=>{
                        const isUsed=usedNames.includes(p.name);
                        const isSel=selectedPlayer?.id===p.id;
                        return (
                          <tr key={p.id} className="hover-row" onClick={()=>setSelectedPlayer(isSel?null:p)}
                            style={{borderBottom:`1px solid ${C.border}`,cursor:"pointer",
                              background:isSel?"rgba(45,106,79,0.2)":isUsed?"rgba(239,68,68,0.04)":"transparent",
                              opacity:isUsed?0.5:1}}>
                            <td style={{padding:"9px 10px",textAlign:"center",fontSize:12,color:C.muted,fontFamily:"'DM Mono',monospace"}}>{p.owgr}</td>
                            <td style={{padding:"9px 10px"}}>
                              <div style={{fontSize:13,fontWeight:600,whiteSpace:"nowrap"}}>{p.country} {p.name}{isUsed&&<UsedBadge/>}</div>

                            </td>
                            <StatCell v={p.sg}/>
                            <StatCell v={p.sgApp}/>
                            <StatCell v={p.sgOtt}/>
                            <StatCell v={p.sgAtg}/>
                            <StatCell v={p.sgPutt}/>
                            <td style={{padding:"9px 10px",textAlign:"center",fontSize:12,fontFamily:"'DM Mono',monospace",color:C.muted}}>{p.drive}</td>
                            <td style={{padding:"9px 10px",textAlign:"center",fontSize:12,fontFamily:"'DM Mono',monospace",color:p.gir>72?"#86efac":C.muted}}>{p.gir}%</td>
                            <td style={{padding:"9px 10px",textAlign:"center",fontSize:12,fontFamily:"'DM Mono',monospace",color:p.avg<70?"#86efac":C.muted}}>{p.avg}</td>

              </div>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
                <h3 style={{fontFamily:"'Playfair Display',serif",fontSize:18}}>Pick Log</h3>
                <button onClick={()=>openAdd(null)} style={{padding:"9px 18px",background:`linear-gradient(135deg,${C.green},#1a3c2e)`,
                  border:"none",borderRadius:8,color:"#fff",cursor:"pointer",fontSize:13,fontWeight:600}}>+ Log Pick</button>
              </div>
              {picks.length===0?(
                <div style={{textAlign:"center",padding:56,color:C.muted}}>
                  <div style={{fontSize:44,marginBottom:10,opacity:0.15}}>⛳</div>
                  <div style={{fontSize:15,marginBottom:5}}>No picks logged yet</div>
                  <div style={{fontSize:13}}>Click "Log Pick" to get started</div>
                </div>
              ):(
                <div style={{background:C.panel,border:`1px solid ${C.border}`,borderRadius:12,overflow:"hidden"}}>
                  <table style={{width:"100%",borderCollapse:"collapse"}}>
                    <thead>
                      <tr style={{background:"#0a1a10"}}>
                        {["Wk","Tournament","Player","Odds","Finish","Top 10","Points","Notes",""].map(h=>(
                          <th key={h} style={{padding:"11px 14px",textAlign:"left",fontSize:11,color:C.muted,
                            letterSpacing:"0.06em",textTransform:"uppercase",fontFamily:"'DM Mono',monospace"}}>{h}</th>
                        ))}
                      </tr>
                    </thead>
                    <tbody>
                      {picks.map((p,i)=>{
                        const isT10=p.top10==="Y"; const isCut=["CUT","WD","DQ"].includes((p.finish||"").toUpperCase());
                        const isWin=p.finish==="1"||p.finish?.toLowerCase().includes("w");
                        const pts=isWin?25:isT10?10:0;
                        return (
                          <tr key={i} className="hover-row" style={{borderBottom:`1px solid ${C.border}`,
                            background:isT10?"rgba(82,183,136,0.07)":isCut?"rgba(239,68,68,0.05)":"transparent"}}>
                            <td style={{padding:"12px 14px",fontFamily:"'DM Mono',monospace",fontSize:13,fontWeight:600,color:C.muted}}>{p.week}</td>
                            <td style={{padding:"12px 14px",fontSize:13}}>{p.tournament}</td>
                            <td style={{padding:"12px 14px",fontWeight:600,fontSize:13}}>{p.player}</td>
                            <td style={{padding:"12px 14px",fontFamily:"'DM Mono',monospace",fontSize:12,color:C.muted}}>{p.odds||"—"}</td>
                            <td style={{padding:"12px 14px",textAlign:"center"}}>
                              <span style={{fontFamily:"'DM Mono',monospace",fontSize:13,fontWeight:700,
                                color:isWin?C.gold:isCut?C.danger:C.muted}}>{p.finish||"—"}</span>
                            </td>
                            <td style={{padding:"12px 14px",textAlign:"center",fontSize:16}}>
                              {p.top10==="Y"?"✅":p.top10==="N"?"❌":"—"}
                            </td>
                            <td style={{padding:"12px 14px",textAlign:"center"}}>
                              <span style={{fontFamily:"'DM Mono',monospace",fontSize:13,fontWeight:700,
                                color:pts>0?C.goldLight:C.muted}}>{pts>0?"+"+pts:"—"}</span>
                            </td>
                            <td style={{padding:"12px 14px",fontSize:12,color:C.muted,maxWidth:180}}>{p.notes||"—"}</td>
                            <td style={{padding:"12px 14px"}}>
                              <button onClick={()=>openEdit(p,i)} style={{padding:"3px 10px",background:"transparent",
                                border:`1px solid ${C.border}`,borderRadius:5,color:C.muted,cursor:"pointer",fontSize:11}}>Edit</button>
                            </td>
                          </tr>
                        );
                      })}
                    </tbody>
                  </table>
                </div>
              )}
            </div>
          )}

          {/* ─── SCHEDULE ─── */}
          {view==="schedule"&&(
            <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:12}}>
              {SCHEDULE.map((s,i)=>{
                const pick=picks.find(p=>parseInt(p.week)===s.week);
                const isT10=pick?.top10==="Y"; const isCut=["CUT","WD","DQ"].includes((pick?.finish||"").toUpperCase());
                return (
                  <div key={i} className="card-hover fade-up" style={{background:C.panel,
                    border:`1px solid ${s.isMajor?"rgba(212,175,55,0.4)":s.isFeatured?"rgba(82,183,136,0.3)":C.border}`,
                    borderRadius:12,padding:16,animationDelay:`${i*0.04}s`,position:"relative",overflow:"hidden"}}>
                    {s.isMajor&&<div style={{position:"absolute",top:0,right:0,background:"rgba(212,175,55,0.15)",
                      padding:"3px 10px",fontSize:10,fontWeight:700,color:C.gold,letterSpacing:"0.05em"}}>MAJOR</div>}
                    {s.isFeatured&&!s.isMajor&&<div style={{position:"absolute",top:0,right:0,background:"rgba(82,183,136,0.15)",
                      padding:"3px 10px",fontSize:10,fontWeight:700,color:"#86efac"}}>THIS WEEK</div>}
                    <div style={{fontSize:11,color:C.muted,fontFamily:"'DM Mono',monospace",marginBottom:4}}>WEEK {s.week}</div>
                    <div style={{fontSize:13,fontWeight:700,color:s.isMajor?C.gold:C.text,marginBottom:2,paddingRight:60}}>{s.name}</div>
                    <div style={{fontSize:11,color:C.muted,marginBottom:12}}>{s.course} · {s.dates}</div>
                    {pick?(
                      <div style={{padding:"9px 11px",background:isT10?"rgba(82,183,136,0.1)":isCut?"rgba(239,68,68,0.08)":"rgba(255,255,255,0.04)",
                        borderRadius:7,border:`1px solid ${isT10?"#52b788":isCut?C.danger:C.border}`}}>
                        <div style={{fontSize:12,fontWeight:600}}>{pick.player}</div>
                        <div style={{display:"flex",gap:8,marginTop:3}}>
                          {pick.odds&&<span style={{fontSize:11,fontFamily:"'DM Mono',monospace",color:C.muted}}>{pick.odds}</span>}
                          {pick.finish&&<span style={{fontSize:11,fontFamily:"'DM Mono',monospace",
                            color:isT10?"#86efac":isCut?"#f87171":C.muted}}>→ {pick.finish}</span>}
                          {pick.top10==="Y"&&<span style={{fontSize:11,color:"#86efac"}}>✓ Top 10</span>}
                        </div>
                        <button onClick={()=>openEdit(pick,picks.indexOf(pick))} style={{marginTop:6,fontSize:11,padding:"2px 8px",
                          background:"transparent",border:`1px solid ${C.border}`,borderRadius:4,color:C.muted,cursor:"pointer"}}>Edit</button>
                      </div>
                    ):(
                      <button onClick={()=>openAdd(s.week)} style={{width:"100%",padding:"8px",background:"transparent",
                        border:`1px dashed ${C.green}`,borderRadius:7,color:C.lightGreen,cursor:"pointer",fontSize:12,transition:"all 0.15s"}}>
                        + Log Pick
                      </button>
                    )}
                  </div>
                );
              })}
            </div>
          )}
        </div>
      </main>

      {/* ── PICK MODAL ── */}
      {pickModal&&(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.78)",display:"flex",alignItems:"center",
          justifyContent:"center",zIndex:1000}} className="fade-in">
          <div style={{background:"#111c14",border:`1px solid ${C.green}`,borderRadius:14,padding:26,width:450,
            maxHeight:"90vh",overflowY:"auto",boxShadow:"0 24px 64px rgba(0,0,0,0.6)"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:22}}>
              <h3 style={{fontFamily:"'Playfair Display',serif",fontSize:20,color:C.text}}>{editIdx!==null?"Edit Pick":"Log a Pick"}</h3>
              <button onClick={()=>setPickModal(false)} style={{background:"none",border:"none",cursor:"pointer",color:C.muted,fontSize:20}}>×</button>
            </div>
            <div style={{display:"flex",flexDirection:"column",gap:13}}>
              <div style={{display:"grid",gridTemplateColumns:"1fr 2fr",gap:10}}>
                <Field label="Week #" type="number" value={pickForm.week}
                  onChange={v=>{const s=SCHEDULE.find(x=>x.week===parseInt(v));setPickForm(f=>({...f,week:v,tournament:s?.name||f.tournament}));}}/>
                <Field label="Tournament" value={pickForm.tournament} onChange={v=>setPickForm(f=>({...f,tournament:v}))}/>
              </div>
              <div>
                <div style={{fontSize:11,color:C.muted,marginBottom:5,textTransform:"uppercase",letterSpacing:"0.06em",fontFamily:"'DM Mono',monospace"}}>Player</div>
                <select value={pickForm.player||""} onChange={e=>setPickForm(f=>({...f,player:e.target.value}))}
                  style={{width:"100%",padding:"10px 12px",background:"#0a1410",border:`1px solid ${C.border}`,
                    borderRadius:8,color:C.text,fontSize:13}}>
                  <option value="">— Select player —</option>
                  {PLAYERS.sort((a,b)=>a.owgr-b.owgr).map(p=>(
                    <option key={p.id} value={p.name}>{p.country} #{p.owgr} {p.name} ({p.tour}) — {p.top10Prob}% T10</option>
                  ))}
                </select>
              </div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
                <Field label="Win Odds (e.g. +3000)" value={pickForm.odds} onChange={v=>setPickForm(f=>({...f,odds:v}))}/>
                <Field label="Final Finish (e.g. 4 or CUT)" value={pickForm.finish} onChange={v=>setPickForm(f=>({...f,finish:v}))}/>
              </div>
              <div>
                <div style={{fontSize:11,color:C.muted,marginBottom:5,textTransform:"uppercase",letterSpacing:"0.06em",fontFamily:"'DM Mono',monospace"}}>Top 10?</div>
                <div style={{display:"flex",gap:8}}>
                  {[["Y","✓  Yes","#86efac","rgba(82,183,136,0.12)"],["N","✗  No","#f87171","rgba(239,68,68,0.08)"],["","— Pending","#6b8f76","transparent"]].map(([val,label,color,bg])=>(
                    <button key={val} onClick={()=>setPickForm(f=>({...f,top10:val}))} style={{flex:1,padding:"9px",
                      background:pickForm.top10===val?bg:"rgba(255,255,255,0.03)",
                      border:`1px solid ${pickForm.top10===val?color:C.border}`,borderRadius:7,
                      color:pickForm.top10===val?color:C.muted,cursor:"pointer",fontSize:13,transition:"all 0.12s"}}>{label}</button>
                  ))}
                </div>
              </div>
              <Field label="Notes" value={pickForm.notes} onChange={v=>setPickForm(f=>({...f,notes:v}))}/>
            </div>
            <div style={{display:"flex",justifyContent:"space-between",marginTop:20}}>
              <div>{editIdx!==null&&<button onClick={()=>delPick(editIdx)} style={{padding:"9px 16px",
                background:C.dangerLight,border:`1px solid ${C.danger}`,borderRadius:8,color:"#f87171",cursor:"pointer",fontSize:13}}>Delete</button>}</div>
              <div style={{display:"flex",gap:8}}>
                <button onClick={()=>setPickModal(false)} style={{padding:"9px 18px",background:"transparent",
                  border:`1px solid ${C.border}`,borderRadius:8,color:C.muted,cursor:"pointer",fontSize:13}}>Cancel</button>
                <button onClick={savePick} disabled={!pickForm.player||!pickForm.week} style={{padding:"9px 22px",
                  background:`linear-gradient(135deg,${C.green},#1a3c2e)`,border:"none",borderRadius:8,color:"#fff",
                  cursor:!pickForm.player||!pickForm.week?"not-allowed":"pointer",fontSize:13,fontWeight:600,
                  opacity:!pickForm.player||!pickForm.week?0.5:1}}>Save Pick</button>
              </div>
            </div>
          </div>
        </div>
      )}

      {/* ── SETTINGS MODAL ── */}
      {settingsOpen&&(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.78)",display:"flex",alignItems:"center",
          justifyContent:"center",zIndex:1000}} className="fade-in">
          <div style={{background:"#111c14",border:`1px solid ${C.border}`,borderRadius:14,padding:28,width:440,
            boxShadow:"0 24px 64px rgba(0,0,0,0.6)"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}>
              <h3 style={{fontFamily:"'Playfair Display',serif",fontSize:20,color:C.text}}>⚙️ API Settings</h3>
              <button onClick={()=>setSettingsOpen(false)} style={{background:"none",border:"none",cursor:"pointer",color:C.muted,fontSize:20}}>×</button>
            </div>
            <div style={{background:"rgba(212,175,55,0.07)",border:`1px solid rgba(212,175,55,0.2)`,borderRadius:8,padding:"12px 14px",marginBottom:18,fontSize:13,color:C.goldLight,lineHeight:1.5}}>
              Your API key is stored only in <strong>your browser's local storage</strong> — it never leaves your device or goes to any server other than Anthropic.
            </div>
            <div style={{marginBottom:6,fontSize:11,color:C.muted,textTransform:"uppercase",letterSpacing:"0.06em",fontFamily:"'DM Mono',monospace"}}>Anthropic API Key</div>
            <input type="password" value={apiKeyInput||apiKey} onChange={e=>setApiKeyInput(e.target.value)}
              placeholder="sk-ant-api03-..."
              style={{width:"100%",padding:"10px 12px",background:"#0a1410",border:`1px solid ${C.border}`,
                borderRadius:8,color:C.text,fontSize:13,marginBottom:8}}/>
            <div style={{fontSize:12,color:C.muted,marginBottom:18}}>
              Get a free key at <strong style={{color:C.goldLight}}>console.anthropic.com</strong> → API Keys
            </div>
            <div style={{display:"flex",gap:8,justifyContent:"flex-end"}}>
              <button onClick={()=>setSettingsOpen(false)} style={{padding:"9px 18px",background:"transparent",
                border:`1px solid ${C.border}`,borderRadius:8,color:C.muted,cursor:"pointer",fontSize:13}}>Cancel</button>
              <button onClick={saveApiKey} style={{padding:"9px 22px",background:`linear-gradient(135deg,${C.green},#1a3c2e)`,
                border:"none",borderRadius:8,color:"#fff",cursor:"pointer",fontSize:13,fontWeight:600}}>Save Key</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
